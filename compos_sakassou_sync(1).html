<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>COMPOS SAKASSOU — Synchronisé v4.1</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>

    ::-webkit-scrollbar-thumb{background:#94a3b8;border-radius:3px;}

      .no-print{display:none!important;}
      body{background:white;}
      .print-card{box-shadow:none!important;border:1px solid #ccc!important;}
    }
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const {useState,useEffect,useRef} = React;

// ═══════════════════════════════════════════════════
// CONSTANTES
// ═══════════════════════════════════════════════════
const CLASSES=["CP1","CP2","CE1","CE2","CM1","CM2"];
const COMPOSITIONS=["Composition 1","Composition 2","Composition 3","Composition 4"];
const ANNEES=["2022-2023","2023-2024","2024-2025","2025-2026","2026-2027"];
const MENTIONS=[
  {label:"Excellent",   min:18, color:"#059669", bg:"#d1fae5"},
  {label:"Très Bien",   min:16, color:"#2563eb", bg:"#dbeafe"},
  {label:"Bien",        min:14, color:"#7c3aed", bg:"#ede9fe"},
  {label:"Assez Bien",  min:12, color:"#0891b2", bg:"#cffafe"},
  {label:"Passable",    min:10, color:"#d97706", bg:"#fef3c7"},
  {label:"Insuffisant", min:0,  color:"#dc2626", bg:"#fee2e2"},
];
const getMention=m=>MENTIONS.find(x=>parseFloat(m)>=x.min)||MENTIONS[MENTIONS.length-1];

// ═══════════════════════════════════════════════════
// STOCKAGE LOCAL (identifiants Examens — sécurisé)
// ═══════════════════════════════════════════════════
const LOCAL={
  get:(k,def)=>{try{const r=localStorage.getItem("csk_"+k);return r!=null?JSON.parse(r):def;}catch{return def;}},
  set:(k,v)=>{try{localStorage.setItem("csk_"+k,JSON.stringify(v));}catch{}},
  has:(k)=>localStorage.getItem("csk_"+k)!=null,
};

// ═══════════════════════════════════════════════════
// STOCKAGE PARTAGÉ (window.storage) — synchronisé
// ═══════════════════════════════════════════════════
const SHARED={
  async get(inspKey,k,def){
    try{
      const res=await window.storage.get(`${inspKey}:${k}`,true);
      if(!res||res.value==null) return def;
      return JSON.parse(res.value);
    }catch{return def;}
  },
  async set(inspKey,k,v){
    try{await window.storage.set(`${inspKey}:${k}`,JSON.stringify(v),true);return true;}
    catch{return false;}
  },
};

// ═══════════════════════════════════════════════════
// CALCULS
// ═══════════════════════════════════════════════════
const calcMoy=(notesElv,matieres)=>{
  let pts=0,coef=0;
  (matieres||[]).forEach(m=>{
    const n=parseFloat(notesElv?.[m.nom]);
    if(!isNaN(n)&&n>=0){pts+=n*parseFloat(m.coeff||1);coef+=parseFloat(m.coeff||1);}
  });
  return coef>0?pts/coef:null;
};

const calcSynthese=(eleves,notes,matieres)=>{
  const res=eleves.map(e=>({...e,moyenne:calcMoy(notes?.[e.id],matieres)})).filter(r=>r.moyenne!==null);
  if(!res.length) return null;
  res.sort((a,b)=>b.moyenne-a.moyenne);
  let rang=1;
  res.forEach((r,i)=>{if(i>0&&res[i].moyenne<res[i-1].moyenne)rang=i+1;r.rang=rang;});
  const total=res.length,admis=res.filter(r=>r.moyenne>=10).length;
  return{resultats:res,total,admis,echec:total-admis,moyClasse:res.reduce((s,r)=>s+r.moyenne,0)/total,taux:admis/total*100};
};

const exportCSV=(rows,fn)=>{
  const c="\uFEFF"+rows.map(r=>r.map(c=>`"${String(c||"").replace(/"/g,'""')}"`).join(";")).join("\n");
  const a=document.createElement("a");
  a.href=URL.createObjectURL(new Blob([c],{type:"text/csv;charset=utf-8;"}));
  a.download=fn;a.click();
};

const Loader=({msg="Chargement..."})=>(
  React.createElement("div",{style:{textAlign:"center",padding:40,color:"#6b7280"}},
    React.createElement("div",{className:"spin",style:{fontSize:"2rem",display:"inline-block",marginBottom:10}},"⏳"),
    React.createElement("div",{style:{fontWeight:700,fontSize:"0.88rem"}},msg)
  )

const SyncBadge=({inspKey})=>(
  React.createElement("div",{style:{
    background:"rgba(255,255,255,0.15)",border:"1px solid rgba(255,255,255,0.3)",
    borderRadius:8,padding:"4px 10px",fontSize:"0.69rem",color:"white",fontWeight:700,display:"inline-flex",alignItems:"center",gap:5

// ═══════════════════════════════════════════════════
// PAGE LOGIN
// ═══════════════════════════════════════════════════
const PageLogin=({onLogin})=>{
  const [mode,setMode]=useState("accueil");
  const [code,setCode]=useState("");
  const [tel,setTel]=useState("");
  const [login,setLogin]=useState("");
  const [pass,setPass]=useState("");
  const [err,setErr]=useState("");
  const [shake,setShake]=useState(false);
  const [loading,setLoading]=useState(false);
  const doShake=()=>{setShake(true);setTimeout(()=>setShake(false),500);};
  const inspKey=LOCAL.get("inspKey","sakassou");

  const connexionEcole=async()=>{
    setLoading(true);setErr("");
    try{
      const ecoles=await SHARED.get(inspKey,"ecoles",{});
      const ecole=Object.values(ecoles).find(e=>e.code===code.trim()&&e.tel===tel.trim());
      if(!ecole){setErr("Code école ou numéro incorrect.");doShake();}
      else onLogin({type:"ecole",ecole,inspKey});
    }catch{setErr("Erreur de connexion. Réessayez.");}
    setLoading(false);
  };

  const connexionExamens=async()=>{
    setLoading(true);setErr("");
    try{
      const creds=LOCAL.get("examens_creds",{login:"sami2026",password:"compos"});
      if(login===creds.login&&pass===creds.password) onLogin({type:"examens",inspKey});
      else{setErr("Identifiant ou mot de passe incorrect.");doShake();}

  return React.createElement("div",{
    style:{minHeight:"100vh",background:"linear-gradient(135deg,#14532d 0%,#166534 50%,#ca8a04 100%)",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:20}
  },
    React.createElement("div",{style:{textAlign:"center",marginBottom:30}},
      React.createElement("div",{style:{width:80,height:80,borderRadius:22,background:"linear-gradient(135deg,#fbbf24,#f59e0b)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:"2.4rem",margin:"0 auto 14px",boxShadow:"0 8px 30px rgba(0,0,0,0.25)"}},"📝"),
      React.createElement("h1",{style:{color:"white",fontSize:"1.75rem",fontWeight:900,letterSpacing:"-0.5px"}},"COMPOS SAKASSOU"),
      React.createElement("p",{style:{color:"rgba(255,255,255,0.8)",fontSize:"0.8rem",fontWeight:600,marginTop:5}},"Gestion des Résultats · CP1→CM2"),
      React.createElement("div",{style:{marginTop:8,background:"rgba(255,255,255,0.15)",borderRadius:10,padding:"5px 14px",display:"inline-block",fontSize:"0.72rem",color:"rgba(255,255,255,0.9)",fontWeight:700}},
        "🔄 Synchronisé · Inspection: "+inspKey
      )
    ),

    mode==="accueil"&&React.createElement("div",{className:"fade",style:{width:"100%",maxWidth:400,display:"flex",flexDirection:"column",gap:14}},
      React.createElement("div",{style:{background:"white",borderRadius:18,padding:26}},
        React.createElement("div",{style:{fontSize:"1rem",fontWeight:800,color:"#166534",marginBottom:18,textAlign:"center"}},"Choisissez votre profil"),
        React.createElement("div",{style:{display:"flex",flexDirection:"column",gap:12}},
          React.createElement("button",{
            onClick:()=>{setMode("ecole");setErr("");},
            style:{background:"linear-gradient(135deg,#1d4ed8,#2563eb)",color:"white",border:"none",borderRadius:12,padding:"15px 18px",cursor:"pointer",textAlign:"left",display:"flex",alignItems:"center",gap:14,fontFamily:"inherit",boxShadow:"0 4px 14px rgba(37,99,235,0.35)",transition:"all 0.2s"},
            onMouseEnter:e=>e.currentTarget.style.transform="translateY(-2px)",
            onMouseLeave:e=>e.currentTarget.style.transform="none",
          },
            React.createElement("span",{style:{fontSize:"2rem"}},"🏫"),
            React.createElement("div",null,
              React.createElement("div",{style:{fontWeight:800,fontSize:"0.95rem"}},"Espace École"),
              React.createElement("div",{style:{fontSize:"0.74rem",opacity:0.85}},"Code école + Tél. directeur")
            )
          ),
          React.createElement("button",{
            onClick:()=>{setMode("examens");setErr("");},
            style:{background:"linear-gradient(135deg,#166534,#15803d)",color:"white",border:"none",borderRadius:12,padding:"15px 18px",cursor:"pointer",textAlign:"left",display:"flex",alignItems:"center",gap:14,fontFamily:"inherit",boxShadow:"0 4px 14px rgba(22,101,52,0.35)",transition:"all 0.2s"},
            onMouseEnter:e=>e.currentTarget.style.transform="translateY(-2px)",
            onMouseLeave:e=>e.currentTarget.style.transform="none",
          },

              React.createElement("div",{style:{fontSize:"0.74rem",opacity:0.85}},"Accès IEPP — Administration")
            )
          )
        )
      ),
      React.createElement("p",{style:{textAlign:"center",color:"rgba(255,255,255,0.6)",fontSize:"0.72rem"}},"🔄 Données synchronisées entre toutes les écoles")
    ),

    mode==="ecole"&&React.createElement("div",{className:`fade${shake?" shake":""}`,style:{width:"100%",maxWidth:380}},
      React.createElement("div",{style:{background:"white",borderRadius:18,padding:26}},
        React.createElement("button",{onClick:()=>{setMode("accueil");setErr("");},style:{background:"none",border:"none",cursor:"pointer",color:"#6b7280",fontSize:"0.82rem",fontWeight:700,marginBottom:16,display:"flex",alignItems:"center",gap:4}},"← Retour"),
        React.createElement("div",{style:{textAlign:"center",marginBottom:18}},
          React.createElement("div",{style:{fontSize:"2rem"}},"🏫"),
          React.createElement("div",{style:{fontWeight:900,color:"#1d4ed8",fontSize:"1rem",marginTop:4}},"Connexion École")
        ),
        React.createElement("div",{style:{display:"flex",flexDirection:"column",gap:12}},
          React.createElement(Inp,{label:"Code École",value:code,onChange:setCode,placeholder:"Ex: CI0100001",req:true}),
          React.createElement(Inp,{label:"N° Téléphone du Directeur",value:tel,onChange:setTel,placeholder:"Ex: 0701020304",req:true}),
          err&&React.createElement("div",{style:{background:"#fee2e2",color:"#dc2626",padding:"8px 12px",borderRadius:8,fontSize:"0.82rem",fontWeight:700}},err),
          loading?React.createElement(Loader,{msg:"Connexion..."}):React.createElement(Btn,{onClick:connexionEcole,color:"#1d4ed8",full:true},"Se connecter")
        )
      )

    mode==="examens"&&React.createElement("div",{className:`fade${shake?" shake":""}`,style:{width:"100%",maxWidth:380}},
      React.createElement("div",{style:{background:"white",borderRadius:18,padding:26}},
        React.createElement("button",{onClick:()=>{setMode("accueil");setErr("");},style:{background:"none",border:"none",cursor:"pointer",color:"#6b7280",fontSize:"0.82rem",fontWeight:700,marginBottom:16,display:"flex",alignItems:"center",gap:4}},"← Retour"),
        React.createElement("div",{style:{textAlign:"center",marginBottom:18}},
          React.createElement("div",{style:{fontSize:"2rem"}},"🏛️"),
          React.createElement("div",{style:{fontWeight:900,color:"#166534",fontSize:"1rem",marginTop:4}},"Service Examens & Concours")
        ),

// ═══════════════════════════════════════════════════
// PAGE CONFIG (Examens seulement)
// ═══════════════════════════════════════════════════
const PageConfig=({session,toast})=>{
  const {inspKey}=session;
  const [cfg,setCfg]=useState({inspection:"",prefecture:"",sousPrefect:"",commune:"",secteur:"",annee:"2024-2025"});
  const [loading,setLoading]=useState(true);
  const [saving,setSaving]=useState(false);

  useEffect(()=>{
    SHARED.get(inspKey,"config",{inspection:"",prefecture:"",sousPrefect:"",commune:"",secteur:"",annee:"2024-2025"})
      .then(c=>{setCfg(c);setLoading(false);});
  },[]);

  const sauver=async()=>{
    setSaving(true);
    const ok=await SHARED.set(inspKey,"config",cfg);
    setSaving(false);
    if(ok) toast("Configuration enregistrée et synchronisée !");
    else toast("Erreur de synchronisation","err");
  };

  if(loading) return React.createElement(Loader,{msg:"Chargement..."});

  const fields=[
    {k:"inspection",l:"🏛️ Inspection (IEPP)",ph:"Ex: IEPP de Sakassou"},
    {k:"prefecture",l:"🏙️ Préfecture",ph:"Ex: Préfecture de Sakassou"},
    {k:"sousPrefect",l:"📍 Sous-Préfecture",ph:"Ex: Sous-Préfecture de Sakassou"},
    {k:"commune",l:"🏘️ Commune",ph:"Ex: Commune de Sakassou"},
    {k:"secteur",l:"🎓 Secteur Pédagogique",ph:"Ex: Secteur Pédagogique N°1"},
  ];

  return React.createElement("div",{style:{maxWidth:580,margin:"0 auto",display:"flex",flexDirection:"column",gap:16}},
    React.createElement("div",{style:{background:"linear-gradient(135deg,#166534,#15803d)",borderRadius:18,padding:22,color:"white"}},
      React.createElement("h2",{style:{fontSize:"1.2rem",fontWeight:900}},"⚙️ Configuration Générale"),
      React.createElement("p",{style:{opacity:0.85,fontSize:"0.83rem",marginTop:4}},"Hiérarchie administrative · Visible par toutes les écoles"),
      React.createElement("div",{style:{marginTop:8}},React.createElement(SyncBadge,{inspKey}))
    ),
    React.createElement(Card,null,
      React.createElement("div",{style:{display:"grid",gap:12}},
        ...fields.map(f=>React.createElement(Inp,{key:f.k,label:f.l,value:cfg[f.k]||"",onChange:v=>setCfg({...cfg,[f.k]:v}),placeholder:f.ph})),
        React.createElement(Sel,{label:"📅 Année scolaire par défaut",value:cfg.annee||"",onChange:v=>setCfg({...cfg,annee:v}),options:ANNEES}),
        React.createElement(Btn,{onClick:sauver,icon:"💾",disabled:saving},saving?"Synchronisation...":"Enregistrer la configuration")
      )
    )
  );
};

// ═══════════════════════════════════════════════════
// PAGE ÉCOLES (Examens seulement)
// ═══════════════════════════════════════════════════
const PageEcoles=({session,toast})=>{
  const {inspKey}=session;
  const [ecoles,setEcoles]=useState({});
  const [form,setForm]=useState({nom:"",directeur:"",code:"",tel:"",secteur:"",sousPrefect:"",commune:""});
  const [editId,setEditId]=useState(null);
  const [loading,setLoading]=useState(true);
  const [saving,setSaving]=useState(false);

  const refresh=async()=>{const e=await SHARED.get(inspKey,"ecoles",{});setEcoles(e);};
  useEffect(()=>{refresh().then(()=>setLoading(false));}, []);

  const sauver=async()=>{
    if(!form.nom||!form.code||!form.tel) return toast("Nom, code et téléphone obligatoires","err");
    setSaving(true);
    const id=editId||`ecole_${Date.now()}`;
    const ec=await SHARED.get(inspKey,"ecoles",{});
    const doublon=Object.values(ec).find(e=>e.code===form.code.trim()&&e.id!==id);
    if(doublon){setSaving(false);return toast("Ce code école existe déjà","err");}
    ec[id]={...form,id,nom:form.nom.trim(),code:form.code.trim(),tel:form.tel.trim(),
      directeur:form.directeur.trim(),secteur:form.secteur?.trim()||"",
      sousPrefect:form.sousPrefect?.trim()||"",commune:form.commune?.trim()||""};
    const ok=await SHARED.set(inspKey,"ecoles",ec);
    setSaving(false);
    if(!ok) return toast("Erreur de synchronisation","err");
    await refresh();
    setForm({nom:"",directeur:"",code:"",tel:"",secteur:"",sousPrefect:"",commune:""});
    setEditId(null);
    toast(editId?"École modifiée !":"École ajoutée !");
  };

  const supprimer=async id=>{
    if(!confirm("Supprimer cette école ?")) return;
    const ec=await SHARED.get(inspKey,"ecoles",{});
    delete ec[id];
    await SHARED.set(inspKey,"ecoles",ec);
    await refresh();toast("Supprimée !");
  };

  const editer=e=>{
    setForm({nom:e.nom,directeur:e.directeur||"",code:e.code||"",tel:e.tel||"",
      secteur:e.secteur||"",sousPrefect:e.sousPrefect||"",commune:e.commune||""});
    setEditId(e.id);
  };

const PageSaisie=({session,toast})=>{
  const {inspKey}=session;
  const isEx=session.type==="examens";
  const [ecoles,setEcoles]=useState({});
  const [allCnv,setAllCnv]=useState({});
  const [cnvId,setCnvId]=useState("");
  const [eleves,setEleves]=useState([]);
  const [notes,setNotes]=useState({});
  const [newElv,setNewElv]=useState({nom:"",prenom:"",sexe:"M",dateNais:""});
  const [loading,setLoading]=useState(true);
  const [cnvLoading,setCnvLoading]=useState(false);
  const saveTimer=useRef(null);

  useEffect(()=>{
    Promise.all([SHARED.get(inspKey,"ecoles",{}),SHARED.get(inspKey,"canevas",{})])
      .then(([e,c])=>{setEcoles(e);setAllCnv(c);setLoading(false);});
  },[]);

  useEffect(()=>{
    if(!cnvId)return;
    setCnvLoading(true);
    Promise.all([SHARED.get(inspKey,"elv_"+cnvId,[]),SHARED.get(inspKey,"nts_"+cnvId,{})])
      .then(([el,nt])=>{setEleves(el);setNotes(nt);setCnvLoading(false);});
  },[cnvId]);

  const myCnv=Object.values(allCnv).filter(c=>isEx||c.ecoleId===session.ecole?.id);
  const cnv=allCnv[cnvId];
  const ecoleName=id=>ecoles[id]?.nom||"?";

  const ajouterElv=async()=>{
    if(!newElv.nom.trim()) return toast("Le NOM est obligatoire","err");
    const e={...newElv,id:"e_"+Date.now(),nom:newElv.nom.trim().toUpperCase(),prenom:newElv.prenom.trim()};
    const nv=[...eleves,e];
    setEleves(nv);
    await SHARED.set(inspKey,"elv_"+cnvId,nv);
    setNewElv({nom:"",prenom:"",sexe:"M",dateNais:""});
    toast("Élève ajouté !");
  };

  const suppElv=async id=>{
    const nv=eleves.filter(e=>e.id!==id);
    setEleves(nv);await SHARED.set(inspKey,"elv_"+cnvId,nv);
    const nn={...notes};delete nn[id];
    setNotes(nn);await SHARED.set(inspKey,"nts_"+cnvId,nn);
  };

  const setNote=(eid,mat,val)=>{
    const nn={...notes,[eid]:{...(notes[eid]||{}),[mat]:val}};
    setNotes(nn);
    if(saveTimer.current) clearTimeout(saveTimer.current);
    saveTimer.current=setTimeout(()=>{SHARED.set(inspKey,"nts_"+cnvId,nn);},800);
  };

  const getMoy=eid=>{if(!cnv)return null;const m=calcMoy(notes[eid],cnv.matieres);return m!==null?m.toFixed(2):null;};

  if(loading) return React.createElement(Loader,{msg:"Chargement..."});

  return React.createElement("div",{style:{maxWidth:1000,margin:"0 auto",display:"flex",flexDirection:"column",gap:14}},
    React.createElement("div",{style:{background:"linear-gradient(135deg,#b45309,#d97706)",borderRadius:18,padding:22,color:"white"}},

  const changerEx=()=>{
    if(!nLogin||!nPass) return toast("Remplissez tous les champs","err");
    if(nPass!==cPass) return toast("Les mots de passe ne correspondent pas","err");
    LOCAL.set("examens_creds",{login:nLogin,password:nPass});
    toast("Identifiants mis à jour !");
    setNLogin("");setNPass("");setCPass("");
  };

  const changerTel=async()=>{
    if(!nTel) return toast("Entrez le nouveau numéro","err");
    if(nTel!==cTel) return toast("Les numéros ne correspondent pas","err");
    const ec=await SHARED.get(inspKey,"ecoles",{});
    ec[session.ecole.id]={...ec[session.ecole.id],tel:nTel};
    const ok=await SHARED.set(inspKey,"ecoles",ec);
    if(ok) toast("Numéro mis à jour ! Reconnectez-vous.");
    else toast("Erreur de synchronisation","err");
    setNTel("");setCTel("");
  };

  return React.createElement("div",{style:{maxWidth:520,margin:"0 auto",display:"flex",flexDirection:"column",gap:16}},
    React.createElement("div",{style:{background:"linear-gradient(135deg,#1e40af,#2563eb)",borderRadius:18,padding:22,color:"white"}},
      React.createElement("h2",{style:{fontSize:"1.2rem",fontWeight:900}},"🔐 Modifier les Identifiants"),
      React.createElement("p",{style:{opacity:0.85,fontSize:"0.83rem",marginTop:4}},isEx?"Identifiant et mot de passe (stockés localement)":"Numéro de téléphone (synchronisé)"),
      React.createElement("div",{style:{marginTop:8}},React.createElement(SyncBadge,{inspKey}))
    ),
    isEx
      ?React.createElement(Card,null,
          React.createElement("div",{style:{fontWeight:800,color:"#1e40af",marginBottom:14}},"🏛️ Service Examens & Concours"),
          React.createElement("div",{style:{background:"#eff6ff",border:"1px solid #bfdbfe",borderRadius:8,padding:"10px 12px",fontSize:"0.8rem",color:"#1e40af",fontWeight:600,marginBottom:14}},
            "🔒 Les identifiants Examens & Concours sont stockés localement (non partagés)."
          ),
          React.createElement("div",{style:{display:"flex",flexDirection:"column",gap:12}},
            React.createElement(Inp,{label:"Nouvel identifiant",value:nLogin,onChange:setNLogin,req:true}),
            React.createElement(Inp,{label:"Nouveau mot de passe",type:"password",value:nPass,onChange:setNPass,req:true}),
            React.createElement(Inp,{label:"Confirmer le mot de passe",type:"password",value:cPass,onChange:setCPass,req:true}),
            React.createElement(Btn,{onClick:changerEx,color:"#1e40af",icon:"💾"},"Enregistrer")
          )
        )
      :React.createElement(Card,null,
          React.createElement("div",{style:{fontWeight:800,color:"#1e40af",marginBottom:4}},"🏫 "+session.ecole?.nom),
          React.createElement("div",{style:{color:"#6b7280",fontSize:"0.83rem",marginBottom:14}},"Code école : ",React.createElement("strong",null,session.ecole?.code)),
          React.createElement("div",{style:{display:"flex",flexDirection:"column",gap:12}},
            React.createElement(Inp,{label:"Nouveau numéro de téléphone",value:nTel,onChange:setNTel,placeholder:"Ex: 0701020304",req:true}),
            React.createElement(Inp,{label:"Confirmer le numéro",value:cTel,onChange:setCTel,placeholder:"Répétez",req:true}),
            React.createElement("div",{style:{background:"#fef3c7",border:"1px solid #fde68a",borderRadius:8,padding:"10px 12px",fontSize:"0.8rem",color:"#92400e",fontWeight:600}},
              "⚠️ Après modification, reconnectez-vous avec le nouveau numéro."
            ),
            React.createElement(Btn,{onClick:changerTel,color:"#1e40af",icon:"💾"},"Enregistrer")
          )
        )
  );
};

// ═══════════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════════
const initApp=async()=>{
  if(!LOCAL.has("examens_creds")) LOCAL.set("examens_creds",{login:"sami2026",password:"compos"});
  if(!LOCAL.has("inspKey")) LOCAL.set("inspKey","sakassou");
  const inspKey=LOCAL.get("inspKey","sakassou");
  try{
    const exists=await SHARED.get(inspKey,"config",null);
    if(!exists){
      await SHARED.set(inspKey,"config",{inspection:"IEPP de Sakassou",prefecture:"Sakassou",sousPrefect:"Sakassou",commune:"Sakassou",secteur:"",annee:"2024-2025"});
      await SHARED.set(inspKey,"ecoles",{});
      await SHARED.set(inspKey,"canevas",{});
    }
  }catch{}
};

// ═══════════════════════════════════════════════════
// MENUS
// ═══════════════════════════════════════════════════
const PAGES_EX=[
  {id:"config",   label:"⚙️ Config",       color:"#166534"},
  {id:"ecoles",   label:"🏫 Écoles",       color:"#1d4ed8"},
  {id:"canevas",  label:"📋 Canevas",      color:"#7c3aed"},
  {id:"saisie",   label:"✏️ Saisie",       color:"#b45309"},
  {id:"synthese", label:"📊 Synthèses",    color:"#0f766e"},
  {id:"password", label:"🔐 Identifiants", color:"#1e40af"},
];
const PAGES_EC=[
  {id:"monecole", label:"🏫 Mon École",    color:"#1d4ed8"},
  {id:"canevas",  label:"📋 Canevas",      color:"#7c3aed"},
  {id:"saisie",   label:"✏️ Saisie",       color:"#b45309"},
  {id:"synthese", label:"📊 Synthèses",    color:"#0f766e"},
  {id:"password", label:"🔐 Mon accès",    color:"#1e40af"},
];

// ═══════════════════════════════════════════════════
// APP
// ═══════════════════════════════════════════════════
const App=()=>{
  const [session,setSession]=useState(null);
  const [page,setPage]=useState("saisie");
  const [toastData,setToastData]=useState(null);
  const [appReady,setAppReady]=useState(false);

  useEffect(()=>{initApp().then(()=>setAppReady(true));}, []);

  const toast=(msg,type="success")=>{
    setToastData({msg,type});
    setTimeout(()=>setToastData(null),3500);
  };

  const onLogin=s=>{
    setSession(s);
    setPage(s.type==="examens"?"config":"monecole");
  };

  if(!appReady) return React.createElement("div",{
    style:{minHeight:"100vh",background:"linear-gradient(135deg,#14532d,#166534 50%,#ca8a04)",display:"flex",alignItems:"center",justifyContent:"center",flexDirection:"column",gap:14}
  },
    React.createElement("div",{className:"spin",style:{fontSize:"3rem"}},"📝"),
    React.createElement("div",{style:{color:"white",fontWeight:700,fontSize:"1rem"}},"Initialisation...")
  );

  if(!session) return React.createElement(PageLogin,{onLogin});

  const pages=session.type==="examens"?PAGES_EX:PAGES_EC;

  return React.createElement("div",null,
    toastData&&React.createElement("div",{
      style:{position:"fixed",top:18,right:18,zIndex:9999,
        background:toastData.type==="success"?"#166534":"#dc2626",
        color:"white",padding:"11px 18px",borderRadius:12,fontWeight:700,fontSize:"0.85rem",
        boxShadow:"0 8px 24px rgba(0,0,0,0.2)",animation:"fi 0.3s ease",maxWidth:320}
    },(toastData.type==="success"?"✅ ":"❌ ")+toastData.msg),

    React.createElement("div",{className:"no-print",style:{background:"linear-gradient(135deg,#14532d,#166534 40%,#ca8a04 100%)",boxShadow:"0 4px 18px rgba(0,0,0,0.2)",position:"sticky",top:0,zIndex:100}},
      React.createElement("div",{style:{maxWidth:1000,margin:"0 auto",padding:"0 14px"}},
        React.createElement("div",{style:{display:"flex",alignItems:"center",gap:12,padding:"12px 0 10px"}},
          React.createElement("div",{style:{width:46,height:46,borderRadius:13,background:"linear-gradient(135deg,#fbbf24,#f59e0b)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:"1.4rem",boxShadow:"0 2px 8px rgba(0,0,0,0.2)",flexShrink:0}},"📝"),
          React.createElement("div",{style:{flex:1}},
            React.createElement("div",{style:{color:"white",fontWeight:900,fontSize:"1.15rem",letterSpacing:"-0.3px"}},"COMPOS SAKASSOU"),
            React.createElement("div",{style:{color:"rgba(255,255,255,0.75)",fontSize:"0.7rem",fontWeight:600}},
              session.type==="examens"?"🏛️ Service Examens & Concours":"🏫 "+session.ecole?.nom
            )
          ),
          React.createElement("div",{style:{display:"flex",alignItems:"center",gap:8,flexShrink:0}},
            React.createElement(SyncBadge,{inspKey:session.inspKey}),
            React.createElement("button",{
              onClick:()=>setSession(null),
              style:{background:"rgba(255,255,255,0.15)",color:"white",border:"1.5px solid rgba(255,255,255,0.3)",borderRadius:8,padding:"6px 12px",cursor:"pointer",fontSize:"0.75rem",fontWeight:700,fontFamily:"inherit"}
            },"🚪 Déco.")
          )
        ),
        React.createElement("div",{style:{display:"flex",gap:4,flexWrap:"wrap",paddingBottom:10,overflowX:"auto"}},
          ...pages.map(p=>React.createElement("button",{
            key:p.id,onClick:()=>setPage(p.id),
            style:{background:page===p.id?"white":"rgba(255,255,255,0.12)",
              color:page===p.id?p.color:"white",
              border:page===p.id?"2px solid white":"2px solid rgba(255,255,255,0.22)",
              borderRadius:9,padding:"6px 13px",fontWeight:800,fontSize:"0.76rem",
              cursor:"pointer",transition:"all 0.15s",fontFamily:"inherit",whiteSpace:"nowrap"}
          },p.label))
        )
      )
    ),

    React.createElement("div",{style:{background:"#f1f5f9",minHeight:"calc(100vh - 108px)",padding:"18px 14px"}},
      React.createElement("div",{style:{maxWidth:1000,margin:"0 auto"}},
        page==="config"   && session.type==="examens" && React.createElement(PageConfig,{session,toast}),
        page==="ecoles"   && session.type==="examens" && React.createElement(PageEcoles,{session,toast}),
        page==="canevas"  && React.createElement(PageCanevas,{session,toast}),
        page==="saisie"   && React.createElement(PageSaisie,{session,toast}),
        page==="synthese" && React.createElement(PageSynthese,{session,toast}),
        page==="monecole" && session.type==="ecole"   && React.createElement(PageMonEcole,{session,toast}),
        page==="password" && React.createElement(PageMotDePasse,{session,toast})
      )
    ),

    React.createElement("div",{className:"no-print",style:{background:"#1e293b",color:"#64748b",textAlign:"center",padding:"12px",fontSize:"0.72rem",fontWeight:600}},
      "COMPOS SAKASSOU v4.1 · 🔄 Synchronisation partagée · CP1→CM2 · Canevas définis par Examens & Concours"
    )
  );
};

ReactDOM.render(React.createElement(App), document.getElementById("root"));
</script>
</body>
</html>
