<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>COMPOS SAKASSOU - PRO</title>

  <!-- React -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>

  <!-- XLSX Export -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

  <!-- Firebase -->
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

  <style>
    body { font-family: Arial; margin: 0; background: #f4f4f4; }
    .container { max-width: 700px; margin: auto; padding: 20px; }
    input, button { padding: 10px; margin: 5px 0; width: 100%; }
    button { background: green; color: white; border: none; cursor: pointer; }
    .card { background: white; padding: 10px; margin-top: 10px; border-radius: 10px; }
  </style>
</head>

<body>
<div id="root"></div>

<script type="text/babel">

// CONFIG FIREBASE
const firebaseConfig = {
  apiKey: "YOUR_API_KEY",
  authDomain: "YOUR_PROJECT.firebaseapp.com",
  projectId: "YOUR_PROJECT",
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.firestore();

function App() {
  const [user, setUser] = React.useState(null);
  const [text, setText] = React.useState("");
  const [items, setItems] = React.useState([]);

  // AUTH
  React.useEffect(() => {
    auth.signInAnonymously();
    auth.onAuthStateChanged(u => {
      if (u) setUser(u);
    });
  }, []);

  // SYNCHRO + OFFLINE CACHE
  React.useEffect(() => {
    if (!user) return;

    const unsubscribe = db.collection("data")
      .where("uid", "==", user.uid)
      .onSnapshot(snapshot => {
        const list = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
        setItems(list);
        localStorage.setItem("offlineData", JSON.stringify(list));
      });

    // Charger cache si offline
    const cache = localStorage.getItem("offlineData");
    if (cache) setItems(JSON.parse(cache));

    return unsubscribe;
  }, [user]);

  const addItem = () => {
    if (!text) return;

    const newItem = {
      text,
      uid: user.uid,
      createdAt: new Date()
    };

    // Ajout local (offline)
    const updated = [...items, newItem];
    setItems(updated);
    localStorage.setItem("offlineData", JSON.stringify(updated));

    // Sync cloud
    db.collection("data").add(newItem);

    setText("");
  };

  // EXPORT EXCEL
  const exportExcel = () => {
    const ws = XLSX.utils.json_to_sheet(items);
    const wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, ws, "Data");
    XLSX.writeFile(wb, "export.xlsx");
  };

  return (
    <div className="container">
      <h2>COMPOS SAKASSOU PRO</h2>

      <input
        placeholder="Entrer une donnée"
        value={text}
        onChange={e => setText(e.target.value)}
      />

      <button onClick={addItem}>Ajouter</button>
      <button onClick={exportExcel}>Exporter Excel</button>

      {items.map((item, i) => (
        <div key={i} className="card">
          {item.text}
        </div>
      ))}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);

</script>

<!-- SERVICE WORKER POUR OFFLINE COMPLET -->
<script>
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js');
}
</script>

</body>
</html>
