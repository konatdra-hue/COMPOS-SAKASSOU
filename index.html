const JSONBIN_KEY = "$2a$10$W7d2M49/pOKuNOaWKSqQBOaYcFyluf4Dv9ikM3.otEj43aOrZtvYu";
const JSONBIN_BASE = "https://api.jsonbin.io/v3";

// Stockage des IDs de bins dans localStorage
const LOCAL = {
  get:(k,d)=>{try{const r=localStorage.getItem("csk_"+k);return r!=null?JSON.parse(r):d;}catch{return d;}},
  set:(k,v)=>{try{localStorage.setItem("csk_"+k,JSON.stringify(v));}catch{}},
};

// ═══════════════════════════════════════════════════
// API JSONBIN — base de données partagée
// ═══════════════════════════════════════════════════
const DB = {
  // Créer un nouveau bin
  async create(name, data) {
    try {
      const res = await fetch(`${JSONBIN_BASE}/b`, {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
          "X-Master-Key": JSONBIN_KEY,
          "X-Bin-Name": name,
          "X-Bin-Private": "false"
        },
        body: JSON.stringify(data)
      });
      const json = await res.json();
      return json.metadata?.id || null;
    } catch { return null; }
  },

  // Lire un bin
  async read(binId) {
    try {
      const res = await fetch(`${JSONBIN_BASE}/b/${binId}/latest`, {
        headers: { "X-Master-Key": JSONBIN_KEY }
      });
      const json = await res.json();
      return json.record || null;
    } catch { return null; }
  },

  // Mettre à jour un bin
  async update(binId, data) {
    try {
      const res = await fetch(`${JSONBIN_BASE}/b/${binId}`, {
        method: "PUT",
        headers: {
          "Content-Type": "application/json",
          "X-Master-Key": JSONBIN_KEY
        },
        body: JSON.stringify(data)
      });
      return res.ok;
    } catch { return false; }
  },

  // Lire ou créer un bin par nom (via localStorage pour mémoriser l'ID)
  async getOrCreate(name, defaultData) {
    let binId = LOCAL.get("bin_"+name, null);
    if (binId) {
      const data = await this.read(binId);
      if (data !== null) return { binId, data };
    }
    // Créer un nouveau bin
    binId = await this.create(name, defaultData);
    if (binId) {
      LOCAL.set("bin_"+name, binId);
      return { binId, data: defaultData };
    }
    return null;
  },

  // Sauvegarder (update ou create)
  async save(name, data) {
    let binId = LOCAL.get("bin_"+name, null);
    if (binId) {
      const ok = await this.update(binId, data);
      if (ok) return true;
    }
    // Recréer si perdu
    binId = await this.create(name, data);
    if (binId) { LOCAL.set("bin_"+name, binId); return true; }
    return false;
  }
};

// ═══════════════════════════════════════════════════
// CALCULS
// ═══════════════════════════════════════════════════
const calcMoy=(notesElv,matieres)=>{
  let pts=0,coef=0;
  (matieres||[]).forEach(m=>{
    const n=parseFloat(notesElv?.[m.nom]);
    if(!isNaN(n)&&n>=0){pts+=n*parseFloat(m.coeff||1);coef+=parseFloat(m.coeff||1);}
  });
  return coef>0?pts/coef:null;
};

const calcSynthese=(eleves,notes,matieres)=>{
  const res=eleves.map(e=>({...e,moyenne:calcMoy(notes?.[e.id],matieres)})).filter(r=>r.moyenne!==null);
  if(!res.length) return null;
  res.sort((a,b)=>b.moyenne-a.moyenne);
  let rang=1;
  res.forEach((r,i)=>{if(i>0&&res[i].moyenne<res[i-1].moyenne)rang=i+1;r.rang=rang;});
  const total=res.length,admis=res.filter(r=>r.moyenne>=10).length;
  return{resultats:res,total,admis,echec:total-admis,moyClasse:res.reduce((s,r)=>s+r.moyenne,0)/total,taux:admis/total*100};
};

const exportCSV=(rows,fn)=>{
  const c="\uFEFF"+rows.map(r=>r.map(c=>`"${String(c||"").replace(/"/g,'""')}"`).join(";")).join("\n");
  const a=document.createElement("a");
  a.href=URL.createObjectURL(new Blob([c],{type:"text/csv;charset=utf-8;"}));
  a.download=fn;a.click();
};

      DB.getOrCreate("sakassou_canevas",{}),
      DB.getOrCreate("sakassou_config",{})
    ]).then(([re,rc,rf])=>{
      if(re) setEcoles(re.data||{});
      if(rc) setAllCnv(rc.data||{});
      if(rf) setCfg(rf.data||{});
      setLoading(false);
    });
  },[]);

  const ecoleName=id=>ecoles[id]?.nom||"?";
  const ecoleDir=id=>ecoles[id]?.directeur||"";

  const generer=async()=>{
    setGenLoading(true);setSynthese(null);
    const myCnv=Object.values(allCnv).filter(c=>{
      if(!isEx&&c.ecoleId!==session.ecole?.id) return false;
      if(f.ecoleId&&c.ecoleId!==f.ecoleId) return false;
      if(f.classe&&c.classe!==f.classe) return false;
      if(f.compNum&&c.compNum!==f.compNum) return false;
      if(f.annee&&c.annee!==f.annee) return false;
      return true;
    });
    if(!myCnv.length){setGenLoading(false);toast("Aucun canevas trouvé","err");return;}
    const results=await Promise.all(myCnv.map(async c=>{
      const [re,rn]=await Promise.all([
        DB.getOrCreate("sakassou_elv_"+c.id,[]),
        DB.getOrCreate("sakassou_nts_"+c.id,{})
      ]);
      const syn=calcSynthese(re?.data||[],rn?.data||{},c.matieres);
      return syn?{...syn,canevas:c,ecoleName:ecoleName(c.ecoleId),directeur:ecoleDir(c.ecoleId)}:null;
    }));
    const res=results.filter(Boolean);
    setGenLoading(false);
    if(!res.length){toast("Aucune note saisie pour ces critères","err");return;}
    setSynthese(res);
  };

  const global=synthese?{

  }:null;

    }));
    exportCSV(rows,"synthese_compos_sakassou_"+Date.now()+".csv");

const PageMotDePasse=({session,toast})=>{
  const isEx=session.type==="examens";
  const [nLogin,setNLogin]=useState("");
  const [nPass,setNPass]=useState("");
  const [cPass,setCPass]=useState("");
  const [nTel,setNTel]=useState("");
  const [cTel,setCTel]=useState("");

  const changerEx=()=>{
    if(!nLogin||!nPass) return toast("Remplissez tous les champs","err");
    if(nPass!==cPass) return toast("Les mots de passe ne correspondent pas","err");
    LOCAL.set("examens_creds",{login:nLogin,password:nPass});
    toast("Identifiants mis à jour !");
    setNLogin("");setNPass("");setCPass("");
  };

  const changerTel=async()=>{
    if(!nTel) return toast("Entrez le nouveau numéro","err");
    if(nTel!==cTel) return toast("Les numéros ne correspondent pas","err");
    const r=await DB.getOrCreate("sakassou_ecoles",{});
    const ec={...r.data};
    ec[session.ecole.id]={...ec[session.ecole.id],tel:nTel};
    const ok=await DB.save("sakassou_ecoles",ec);
    if(ok) toast("Numéro mis à jour ! Reconnectez-vous.");
    else toast("Erreur","err");
    setNTel("");setCTel("");
  };

  return React.createElement("div",{style:{maxWidth:520,margin:"0 auto",display:"flex",flexDirection:"column",gap:16}},
