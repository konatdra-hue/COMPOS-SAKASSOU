  <script>
    if('serviceWorker' in navigator) {
      window.addEventListener('load', () => navigator.serviceWorker.register('/sw.js'));
    }
    // PWA install prompt
    let deferredPrompt;
    window.addEventListener('beforeinstallprompt', e => {
      e.preventDefault();
      deferredPrompt = e;
      document.getElementById('pwa-install-btn')?.style.setProperty('display','flex');
    });
    window.installPWA = () => {
      if(deferredPrompt) {
        deferredPrompt.prompt();
        deferredPrompt.userChoice.then(() => { deferredPrompt = null; });
      }
    };
  </script>

const JSONBIN_KEY = "$2a$10$W7d2M49/pOKuNOaWKSqQBOaYcFyluf4Dv9ikM3.otEj43aOrZtvYu";
const JSONBIN_BASE = "https://api.jsonbin.io/v3";

// Stockage des IDs de bins dans localStorage
const LOCAL = {
  get:(k,d)=>{try{const r=localStorage.getItem("csk_"+k);return r!=null?JSON.parse(r):d;}catch{return d;}},
  set:(k,v)=>{try{localStorage.setItem("csk_"+k,JSON.stringify(v));}catch{}},
};

// ═══════════════════════════════════════════════════
// API JSONBIN — base de données partagée
// ═══════════════════════════════════════════════════
const DB = {
  // Créer un nouveau bin
  async create(name, data) {
    try {
      const res = await fetch(`${JSONBIN_BASE}/b`, {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
          "X-Master-Key": JSONBIN_KEY,
          "X-Bin-Name": name,
          "X-Bin-Private": "false"
        },
        body: JSON.stringify(data)
      });
      const json = await res.json();
      return json.metadata?.id || null;
    } catch { return null; }
  },

  // Lire un bin
  async read(binId) {
    try {
      const res = await fetch(`${JSONBIN_BASE}/b/${binId}/latest`, {
        headers: { "X-Master-Key": JSONBIN_KEY }
      });
      const json = await res.json();
      return json.record || null;
    } catch { return null; }
  },

  // Mettre à jour un bin
  async update(binId, data) {
    try {
      const res = await fetch(`${JSONBIN_BASE}/b/${binId}`, {
        method: "PUT",
        headers: {
          "Content-Type": "application/json",
          "X-Master-Key": JSONBIN_KEY
        },
        body: JSON.stringify(data)
      });
      return res.ok;
    } catch { return false; }
  },

  // Lire ou créer un bin par nom (via localStorage pour mémoriser l'ID)
  async getOrCreate(name, defaultData) {
    let binId = LOCAL.get("bin_"+name, null);
    if (binId) {
      const data = await this.read(binId);
      if (data !== null) return { binId, data };
    }
    // Créer un nouveau bin
    binId = await this.create(name, defaultData);
    if (binId) {
      LOCAL.set("bin_"+name, binId);
      return { binId, data: defaultData };
    }
    return null;
  },

  // Sauvegarder (update ou create)
  async save(name, data) {
    let binId = LOCAL.get("bin_"+name, null);
    if (binId) {
      const ok = await this.update(binId, data);
      if (ok) return true;
    }
    // Recréer si perdu
    binId = await this.create(name, data);
    if (binId) { LOCAL.set("bin_"+name, binId); return true; }
    return false;
  }
};

// CALCULS
// ═══════════════════════════════════════════════════
const calcMoy=(notesElv,matieres)=>{
  let pts=0,coef=0;
  (matieres||[]).forEach(m=>{
    const n=parseFloat(notesElv?.[m.nom]);
    const noteMax=parseFloat(m.noteMax||20);
    const c=parseFloat(m.coeff||1);
    if(!isNaN(n)&&n>=0&&noteMax>0){
      // Normalise la note sur 20 avant d'appliquer le coefficient
      pts+=(n/noteMax)*20*c;
      coef+=c;
    }
  });
  return coef>0?pts/coef:null;
};

const calcSynthese=(eleves,notes,matieres)=>{
  const res=eleves.map(e=>({...e,moyenne:calcMoy(notes?.[e.id],matieres)})).filter(r=>r.moyenne!==null);
  if(!res.length) return null;
  res.sort((a,b)=>b.moyenne-a.moyenne);
  let rang=1;
  res.forEach((r,i)=>{if(i>0&&res[i].moyenne<res[i-1].moyenne)rang=i+1;r.rang=rang;});
  const total=res.length,admis=res.filter(r=>r.moyenne>=10).length;
  return{resultats:res,total,admis,echec:total-admis,moyClasse:res.reduce((s,r)=>s+r.moyenne,0)/total,taux:admis/total*100};
};

const exportCSV=(rows,fn)=>{
  const c="\uFEFF"+rows.map(r=>r.map(c=>`"${String(c||"").replace(/"/g,'""')}"`).join(";")).join("\n");
  const a=document.createElement("a");
  a.href=URL.createObjectURL(new Blob([c],{type:"text/csv;charset=utf-8;"}));
  a.download=fn;a.click();
};

    setForm({nom:"",directeur:"",code:"",tel:""});setEditId(null);

  };

  const supprimer=async id=>{
    if(!confirm("Supprimer cette école ?")) return;
    const r=await DB.getOrCreate("sakassou_ecoles",{});
    const ec={...r.data};delete ec[id];
    await DB.save("sakassou_ecoles",ec);
    setEcoles(ec);toast("Supprimée !");
  };

  const editer=e=>{setForm({nom:e.nom,directeur:e.directeur||"",code:e.code||"",tel:e.tel||""});setEditId(e.id);};

  // ── Télécharger modèle Excel ──
  const telechargerModele=()=>{
    const wb=XLSX.utils.book_new();
    const ws=XLSX.utils.aoa_to_sheet([
      ["NOM_ECOLE","DIRECTEUR","CODE_ECOLE","TEL_DIRECTEUR"],
      ["EPP Sakassou Centre","KOUAME Amani","CI0100001","0701020304"],
      ["EPP Sakassou Nord","KOFFI Yao","CI0100002","0702030405"],

    XLSX.writeFile(wb,"modele_ecoles_sakassou.xlsx");
    toast("Modèle Excel téléchargé !");
  };

  // ── Importer depuis Excel ──
  const importerExcel=async(e)=>{
    const file=e.target.files[0];
    if(!file) return;
    setImporting(true);
    try{
      const buf=await file.arrayBuffer();
      const wb=XLSX.read(buf,{type:"array"});
      const ws=wb.Sheets[wb.SheetNames[0]];
      const rows=XLSX.utils.sheet_to_json(ws,{header:1,defval:""});
      // Ignore header row
      const dataRows=rows.slice(1).filter(r=>r[0]&&r[2]&&r[3]);
      if(!dataRows.length){setImporting(false);return toast("Aucune donnée valide trouvée","err");}
      const r=await DB.getOrCreate("sakassou_ecoles",{});
      const ec={...r?.data||{}};
      let added=0,skipped=0;
      dataRows.forEach(row=>{
        const nom=String(row[0]).trim();

        if(!nom||!code||!tel){skipped++;return;}
        const doublon=Object.values(ec).find(ex=>ex.code===code);
        if(doublon){skipped++;return;}
        const id=`ecole_${Date.now()}_${added}`;
        ec[id]={id,nom,directeur,code,tel};
        added++;
      });
      const ok=await DB.save("sakassou_ecoles",ec);
      setImporting(false);
      if(!ok) return toast("Erreur lors de la sauvegarde","err");
      setEcoles(ec);
      toast(`✅ ${added} école(s) importée(s)${skipped?" · "+skipped+" ignorée(s) (doublons/vides)":""}`);
    }catch(err){
      setImporting(false);
      toast("Erreur lecture fichier Excel","err");
    }
    e.target.value="";
  };

  // ── Export liste écoles Excel ──
  const exporterExcel=()=>{
    const wb=XLSX.utils.book_new();
    const rows=[["NOM_ECOLE","DIRECTEUR","CODE_ECOLE","TEL_DIRECTEUR"]];
    Object.values(ecoles).forEach(e=>rows.push([e.nom,e.directeur||"",e.code,e.tel]));
    const ws=XLSX.utils.aoa_to_sheet(rows);
    ws["!cols"]=[{wch:30},{wch:25},{wch:18},{wch:18}];
    XLSX.utils.book_append_sheet(wb,ws,"Écoles");
    XLSX.writeFile(wb,"ecoles_sakassou_"+new Date().toISOString().slice(0,10)+".xlsx");
    toast("Liste exportée en Excel !");

const PageSynthese=({session,toast})=>{
  const isEx=session.type==="examens";

  const [f,setF]=useState({ecoleId:isEx?"":session.ecole?.id||"",classe:"",compNum:"",annee:""});
  const [synthese,setSynthese]=useState(null);
  const [loading,setLoading]=useState(true);
  const [genLoading,setGenLoading]=useState(false);

  useEffect(()=>{
    Promise.all([
      DB.getOrCreate("sakassou_ecoles",{}),
      DB.getOrCreate("sakassou_canevas",{}),
      DB.getOrCreate("sakassou_config",{})
    ]).then(([re,rc,rf])=>{
      if(re) setEcoles(re.data||{});
      if(rc) setAllCnv(rc.data||{});
      if(rf) setCfg(rf.data||{});
      setLoading(false);
    });
  },[]);

  const ecoleName=id=>ecoles[id]?.nom||"?";
  const ecoleDir=id=>ecoles[id]?.directeur||"";

  const generer=async()=>{
    setGenLoading(true);setSynthese(null);
    const myCnv=Object.values(allCnv).filter(c=>{
      // canevas global — pas de filtre par école
      if(f.ecoleId&&c.ecoleId!==f.ecoleId) return false;
      if(f.classe&&c.classe!==f.classe) return false;
      if(f.compNum&&c.compNum!==f.compNum) return false;
      if(f.annee&&c.annee!==f.annee) return false;
      return true;
    });
    if(!myCnv.length){setGenLoading(false);toast("Aucun canevas trouvé","err");return;}
    // Chaque canevas × chaque école → une synthèse
    const allEcoles=isEx?Object.keys(ecoles):[session.ecole?.id].filter(Boolean);
    const pairs=[];
    myCnv.forEach(c=>allEcoles.forEach(e_id=>pairs.push({c,e_id})));
    const results=await Promise.all(pairs.map(async ({c,e_id})=>{
      const [re,rn]=await Promise.all([
        DB.getOrCreate("sakassou_elv_"+c.id+"_"+e_id,[]),
        DB.getOrCreate("sakassou_nts_"+c.id+"_"+e_id,{})
      ]);
      const syn=calcSynthese(re?.data||[],rn?.data||{},c.matieres);
      return syn?{...syn,canevas:c,ecoleName:ecoleName(e_id),directeur:ecoleDir(e_id)}:null;
    }));
    const res=results.filter(Boolean);
    setGenLoading(false);
    if(!res.length){toast("Aucune note saisie pour ces critères","err");return;}
    setSynthese(res);
  };

  const global=synthese?{
    total:synthese.reduce((s,r)=>s+r.total,0),
    admis:synthese.reduce((s,r)=>s+r.admis,0),
    echec:synthese.reduce((s,r)=>s+r.echec,0),
    garcons:synthese.reduce((s,r)=>s+r.resultats.filter(e=>e.sexe==="M").length,0),
    filles:synthese.reduce((s,r)=>s+r.resultats.filter(e=>e.sexe==="F").length,0),
    moy:synthese.reduce((s,r)=>s+r.moyClasse*r.total,0)/synthese.reduce((s,r)=>s+r.total,0),
  }:null;

  const doExport=()=>{
    if(!synthese)return;
    const rows=[[`COMPOS SAKASSOU — ${cfg.inspection||"IEPP"}`],[`${f.compNum||"Toutes compos"} · ${f.annee||""}`],[`Généré le ${new Date().toLocaleDateString("fr-FR")}`],[],
      ["École","Classe","Compos.","Rang","NOM","Prénoms","Sexe","Date Nais.","Moyenne/20","Mention","Décision"]];
    synthese.forEach(s=>s.resultats.forEach(r=>{
      rows.push([s.ecoleName,s.canevas.classe,s.canevas.compNum,r.rang,r.nom,r.prenom,r.sexe,r.dateNais||"",r.moyenne.toFixed(2),getMention(r.moyenne).label,r.moyenne>=10?"Admis(e)":"Redoublant(e)"]);
    }));
    exportCSV(rows,"synthese_compos_sakassou_"+Date.now()+".csv");
    toast("Export CSV réussi !");
  };

  if(loading) return React.createElement(Loader,{msg:"Chargement..."});

  return React.createElement("div",{style:{maxWidth:1000,margin:"0 auto",display:"flex",flexDirection:"column",gap:14}},
    React.createElement("div",{style:{background:"linear-gradient(135deg,#0f766e,#0d9488)",borderRadius:18,padding:22,color:"white"}},
      React.createElement("h2",{style:{fontSize:"1.2rem",fontWeight:900}},"📊 Synthèses & Rapports"),
      React.createElement("p",{style:{opacity:0.85,fontSize:"0.83rem",marginTop:4}},"Données de toutes les écoles · Synchronisées")
    ),
    React.createElement(Card,null,
      React.createElement("div",{style:{display:"grid",gridTemplateColumns:"repeat(2,1fr)",gap:10,marginBottom:12}},
        isEx&&React.createElement(Sel,{label:"École",value:f.ecoleId,onChange:v=>setF({...f,ecoleId:v}),options:Object.values(ecoles).map(e=>({v:e.id,l:e.nom}))}),
        React.createElement(Sel,{label:"Classe",value:f.classe,onChange:v=>setF({...f,classe:v}),options:CLASSES}),
        React.createElement(Sel,{label:"Composition",value:f.compNum,onChange:v=>setF({...f,compNum:v}),options:COMPOSITIONS}),
        React.createElement(Sel,{label:"Année scolaire",value:f.annee,onChange:v=>setF({...f,annee:v}),options:ANNEES})
      ),
      React.createElement("div",{style:{display:"flex",gap:10,flexWrap:"wrap"}},
        React.createElement(Btn,{onClick:generer,color:"#0f766e",icon:"⚡",disabled:genLoading},genLoading?"Chargement...":"Générer la synthèse"),
        synthese&&React.createElement(Btn,{outline:true,color:"#0f766e",onClick:doExport,icon:"📥"},"Exporter CSV"),
        synthese&&React.createElement(Btn,{outline:true,color:"#6b7280",onClick:()=>window.print(),icon:"🖨️"},"Imprimer / PDF")

// PAGE MOT DE PASSE
// ═══════════════════════════════════════════════════
const PageMotDePasse=({session,toast})=>{
  const isEx=session.type==="examens";
  const [nLogin,setNLogin]=useState("");
  const [nPass,setNPass]=useState("");
  const [cPass,setCPass]=useState("");
  const [nTel,setNTel]=useState("");
  const [cTel,setCTel]=useState("");

  const changerEx=()=>{
    if(!nLogin||!nPass) return toast("Remplissez tous les champs","err");
    if(nPass!==cPass) return toast("Les mots de passe ne correspondent pas","err");
    LOCAL.set("examens_creds",{login:nLogin,password:nPass});
    toast("Identifiants mis à jour !");
    setNLogin("");setNPass("");setCPass("");
  };

  const changerTel=async()=>{
    if(!nTel) return toast("Entrez le nouveau numéro","err");
    if(nTel!==cTel) return toast("Les numéros ne correspondent pas","err");
    const r=await DB.getOrCreate("sakassou_ecoles",{});
    const ec={...r.data};
    ec[session.ecole.id]={...ec[session.ecole.id],tel:nTel};
    const ok=await DB.save("sakassou_ecoles",ec);
    if(ok) toast("Numéro mis à jour ! Reconnectez-vous.");
    else toast("Erreur","err");
    setNTel("");setCTel("");
  };

  return React.createElement("div",{style:{maxWidth:520,margin:"0 auto",display:"flex",flexDirection:"column",gap:16}},
    React.createElement("div",{style:{background:"linear-gradient(135deg,#1e40af,#2563eb)",borderRadius:18,padding:22,color:"white"}},
      React.createElement("h2",{style:{fontSize:"1.2rem",fontWeight:900}},"🔐 Modifier les Identifiants"),
      React.createElement("p",{style:{opacity:0.85,fontSize:"0.83rem",marginTop:4}},isEx?"Identifiant et mot de passe":"Numéro de téléphone")
    ),
    isEx
      ?React.createElement(Card,null,
          React.createElement("div",{style:{fontWeight:800,color:"#1e40af",marginBottom:14}},"🏛️ Service Examens & Concours"),
          React.createElement("div",{style:{display:"flex",flexDirection:"column",gap:12}},
            React.createElement(Inp,{label:"Nouvel identifiant",value:nLogin,onChange:setNLogin,req:true}),
            React.createElement(Inp,{label:"Nouveau mot de passe",type:"password",value:nPass,onChange:setNPass,req:true}),
            React.createElement(Inp,{label:"Confirmer",type:"password",value:cPass,onChange:setCPass,req:true}),
            React.createElement(Btn,{onClick:changerEx,color:"#1e40af",icon:"💾"},"Enregistrer")
          )
        )
      :React.createElement(Card,null,
          React.createElement("div",{style:{fontWeight:800,color:"#1e40af",marginBottom:4}},"🏫 "+session.ecole?.nom),
          React.createElement("div",{style:{display:"flex",flexDirection:"column",gap:12}},
            React.createElement(Inp,{label:"Nouveau numéro",value:nTel,onChange:setNTel,req:true}),
            React.createElement(Inp,{label:"Confirmer",value:cTel,onChange:setCTel,req:true}),
            React.createElement(Btn,{onClick:changerTel,color:"#1e40af",icon:"💾"},"Enregistrer")
          )
        )
  );
};
